name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - run: pytest --cov=core --cov=api --cov-report=xml
      - uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - run: black --check .
      - run: flake8 core/ api/ tests/ --max-line-length=120

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t agentic-energy-grid-balancer .
      
      - name: Run container
        run: |
          docker run -d \
            --name test-api \
            -p 8001:8001 \
            -e LLM_BACKEND=mock \
            agentic-energy-grid-balancer
          sleep 15
          
      - name: Health check
        run: |
          curl -f --retry 5 --retry-delay 3 http://localhost:8001/health || exit 1
          
      - name: Test simulation endpoint
        run: |
          curl -f -X POST http://localhost:8001/simulation/run \
            -H "Content-Type: application/json" \
            -d '{"steps": 6, "llm_backend": "mock"}' || exit 1
            
      - name: Test agent performance endpoint
        run: |
          curl -f http://localhost:8001/agents/performance || exit 1
          
      - name: Test carbon report endpoint
        run: |
          curl -f http://localhost:8001/carbon/report || exit 1
          
      - name: Test market history endpoint
        run: |
          curl -f http://localhost:8001/market/history || exit 1
          
      - name: Cleanup
        if: always()
        run: docker stop test-api && docker rm test-api