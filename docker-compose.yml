services:
  api:
    build: .
    ports:
      - "8001:8001"
    environment:
      - LLM_BACKEND=mock
      - PYTHONUNBUFFERED=1
    volumes:
      # Persist the SQLite database across container restarts
      - ./energy_grid.db:/app/energy_grid.db
    restart: unless-stopped

  # Optional: real LLM inference via Ollama
  # Start with:  docker compose --profile llm up --build
  # Then set:    LLM_BACKEND=ollama (or omit for mock)
  ollama:
    profiles:
      - llm
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  ollama_data: