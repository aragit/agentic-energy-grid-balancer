services:
  api:
    build: .
    ports:
      - "8001:8001"
    environment:
      - LLM_BACKEND=mock
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///app/data/grid.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  ollama_data: